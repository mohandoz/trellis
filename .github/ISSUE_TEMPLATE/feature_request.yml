name: Feature request
description: Propose a new feature or enhancement
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation that drove you to request this.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Conjure to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you try / consider?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New skill template
        - New agent template
        - New hook
        - New stack profile
        - New compliance overlay
        - New migration source
        - CLI enhancement
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: willingness
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR for this
        - label: I am willing to help test
