name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends jq shellcheck

      - name: Lint shell scripts
        run: |
          find cli scripts migrations profiles compliance templates/hooks tests lib -name '*.sh' \
            -exec shellcheck -S error -e SC2164,SC2044,SC2034,SC2155 {} +

      - name: Validate JSON
        run: |
          find templates .claude-plugin -name '*.json' \
            -exec jq empty {} \;

      - name: Check version consistency
        run: |
          ver=$(cat VERSION)
          mkt_ver=$(jq -r '.plugins[0].version // empty' .claude-plugin/marketplace.json)
          plg_ver=$(jq -r '.version // empty' .claude-plugin/plugin.json)
          rc=0
          [ "$mkt_ver" = "$ver" ] || { echo "FAIL: marketplace.json .plugins[0].version ($mkt_ver) != VERSION ($ver)"; rc=1; }
          [ "$plg_ver"  = "$ver" ] || { echo "FAIL: plugin.json .version ($plg_ver) != VERSION ($ver)"; rc=1; }
          [ "$rc" -eq 0 ] && echo "OK: all version fields match $ver"
          exit "$rc"

      - name: Install claude CLI
        run: |
          sudo install -d -m 0755 /etc/apt/keyrings
          sudo curl -fsSL https://downloads.claude.ai/keys/claude-code.asc \
            -o /etc/apt/keyrings/claude-code.asc
          echo "deb [signed-by=/etc/apt/keyrings/claude-code.asc] https://downloads.claude.ai/claude-code/apt/stable stable main" \
            | sudo tee /etc/apt/sources.list.d/claude-code.list
          sudo apt-get update -qq
          sudo apt-get install -y claude-code
          claude --version

      - name: Validate plugin manifests
        run: |
          claude plugin validate .
          claude plugin validate .claude-plugin/plugin.json

      - name: Run kit test suite
        run: bash tests/run.sh

      - name: Assert demo GIF committed
        run: test -s .github/assets/demo.gif || { echo "demo.gif is missing or empty — run bash scripts/record-demo.sh to regenerate"; exit 1; }

      - name: Audit script smoke
        run: bash scripts/audit-setup.sh . || true

  audit-on-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scaffold fixture
        run: |
          mkdir -p /tmp/fixture && cd /tmp/fixture
          git init -q
          bash "$GITHUB_WORKSPACE/scripts/init-project.sh" new /tmp/fixture
      - name: Audit fixture
        run: |
          # Fresh fixture has no CLAUDE.md yet (Claude writes it after init).
          # Accept rc=0 (pass), 1 (warnings), 2 (CLAUDE.md missing on fresh fixture is expected).
          bash "$GITHUB_WORKSPACE/scripts/audit-setup.sh" /tmp/fixture > /tmp/audit.log 2>&1 || true
          grep -q "PASS:" /tmp/audit.log

  windows-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run kit test suite (Git Bash)
        shell: bash
        run: bash tests/run.sh

  windows-hook-wiring:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scaffold fixture
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/fixture"
          CONJURE_HOME="$GITHUB_WORKSPACE" cli/conjure init "$RUNNER_TEMP/fixture"

      - name: Assert node version
        shell: bash
        run: node --version

      - name: Assert node hook wiring in settings.json
        shell: bash
        run: grep 'node' "$RUNNER_TEMP/fixture/.claude/settings.json"

      - name: Assert no bash hook regression
        shell: bash
        run: |
          if grep 'bash .claude/hooks' "$RUNNER_TEMP/fixture/.claude/settings.json"; then
            echo "FAIL: bash hook commands found (SAFE-03 regression)" && exit 1
          fi

  windows-ps1-shim:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Smoke-test conjure.ps1 --version (pwsh)
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\conjure.ps1" --version
          if ($LASTEXITCODE -ne 0) {
            Write-Error "conjure.ps1 --version exited $LASTEXITCODE (expected 0)"
            exit 1
          }
          Write-Host "OK: conjure.ps1 --version exit 0"

      - name: Confirm exit code 2 propagation (pwsh)
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\conjure.ps1" init
          if ($LASTEXITCODE -ne 2) {
            Write-Error "Expected exit 2 from conjure.ps1 init, got $LASTEXITCODE"
            exit 1
          }
          Write-Host "OK: exit code 2 propagated correctly"
